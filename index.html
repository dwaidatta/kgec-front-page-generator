<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Front Page Generator for KGEC Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="app-title">
    <i class="bi bi-layout-text-sidebar"></i>
    <span>Front Page Generator</span>
  </div>
  <div class="app-actions">
    <a href="https://github.com/researcherankit/hetc-front-page-generator" target="_blank" class="star-btn">
      <i class="bi bi-github"></i>
      <span>Star on GitHub</span>
    </a>
    <span class="header-divider"></span>
    <span class="header-meta">
      Made with <i class="bi bi-heart-fill heart-icon"></i> by
      <a href="https://dwaidatta.in/" target="_blank" class="meta-link">Dwaipayan Datta</a> X <a href="https://github.com/researcherankit" target="_blank" class="meta-link">Ankit Gupta</a>
    </span>
  </div>
</header>

<!-- Main -->
<main class="app-main">

  <section class="page-pane">
    <div class="page-frame-wrap">
      <iframe id="page-frame" src="page.html?v=2" scrolling="no"></iframe>
    </div>
  </section>

  <aside class="control-pane">

    <div class="control-section">
      <h2 class="section-title">
        <i class="bi bi-aspect-ratio"></i>
        <span>PAGE BORDERS</span>
      </h2>
      <div class="grid-2">
        <label>Left (mm)<input type="number" id="margin-left" value="15"></label>
        <label>Right (mm)<input type="number" id="margin-right" value="15"></label>
        <label>Top (mm)<input type="number" id="margin-top" value="15"></label>
        <label>Bottom (mm)<input type="number" id="margin-bottom" value="15"></label>
      </div>
    </div>

    <div class="control-section">
      <h2 class="section-title">
        <i class="bi bi-fonts"></i>
        <span>FONT SIZE</span>
      </h2>
      <div class="font-size-row">
        <span class="fs-label">Input</span>
        <button class="btn-fs" data-dir="-0.5"><i class="bi bi-dash-circle"></i></button>
        <span class="fs-value" id="fs-inputs">4.5</span>
        <button class="btn-fs" data-dir="0.5"><i class="bi bi-plus-circle"></i></button>
        <span class="fs-unit">mm</span>
      </div>
    </div>

    <div class="control-section">
      <h2 class="section-title">
        <i class="bi bi-card-text"></i>
        <span>Details</span>
      </h2>
      <div id="details-list" style="display:flex; flex-direction:column; gap:4px;">
        <input type="text" class="side-input" data-target="lab-day-input" placeholder="Lab Day">
        <input type="text" class="side-input" data-target="name-input" placeholder="Name">
        <input type="text" class="side-input" data-target="roll-input" placeholder="Roll">
        <input type="text" class="side-input" data-target="paper-name-input" placeholder="Paper Name">
        <input type="text" class="side-input" data-target="paper-code-input" placeholder="Paper Code">
        <input type="text" class="side-input" data-target="dept-input" placeholder="Department">
        <input type="text" class="side-input" data-target="year-input" placeholder="Year">
        <input type="text" class="side-input" data-target="title-input-1" placeholder="Title Line 1">
        <input type="text" class="side-input" data-target="title-input-2" placeholder="Title Line 2">
        <input type="text" class="side-input" data-target="learning-input-1" placeholder="Learning Line 1">
        <input type="text" class="side-input" data-target="learning-input-2" placeholder="Learning Line 2">
        <input type="text" class="side-input" data-target="learning-input-3" placeholder="Learning Line 3">
        <div style="font-weight: bold; margin-top: 8px;">Blooms Taxonomy:</div>
        <label><input type="checkbox" class="side-checkbox" data-target="bloom-remember"> Remember</label>
        <label><input type="checkbox" class="side-checkbox" data-target="bloom-understand"> Understand</label>
        <label><input type="checkbox" class="side-checkbox" data-target="bloom-apply"> Apply</label>
        <label><input type="checkbox" class="side-checkbox" data-target="bloom-analyze"> Analyze</label>
        <label><input type="checkbox" class="side-checkbox" data-target="bloom-evaluate"> Evaluate</label>
        <label><input type="checkbox" class="side-checkbox" data-target="bloom-create"> Create</label>
      </div>
    </div>

    <div class="control-section control-section--footer">
      <div class="pdf-name-row">
        <input type="text" id="pdf-filename" placeholder="File name (optional)">
      </div>
      <button id="download-pdf" class="btn-primary">
        <i class="bi bi-download"></i>
        <span>Save as PDF</span>
      </button>
    </div>

  </aside>
</main>

<!-- Star popup -->
<div class="star-popup" id="star-popup">
  <div class="star-popup-card">
    <i class="bi bi-star-fill"></i>
    <h3>Found this useful?</h3>
    <p>It takes 2 seconds and means a lot! Star the repo to show your support.</p>
    <div class="star-popup-actions">
      <a href="https://github.com/researcherankit/hetc-front-page-generator" target="_blank" class="btn-star-action">
        <i class="bi bi-github"></i>
        <span>Star on GitHub</span>
      </a>
      <button class="btn-ghost" id="star-popup-close">
        <i class="bi bi-x"></i>
        <span>Maybe later</span>
      </button>
    </div>
  </div>
</div>

<script src="script.js?v=3"></script>
<script>
  if (window.location.protocol === 'file:') {
    alert('Two-way sync and PDF saving will NOT work when running this file directly from your computer (file:// protocol). Please use the localhost server: http://localhost:8000/index.html');
  }
</script>
</body>
</html>
