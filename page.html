<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Front Page</title>
  <link rel="stylesheet" href="page.css">
</head>
<body>
  <div class="page-wrap">
    <div class="inner-frame">

      <section id="group-header" class="page-group header-group">
        <div class="header-group-inner">
          <svg class="curve-text" viewBox="0 0 1432 710" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <path id="topArc" d="M 296,355 A 420,420 0 0,1 1136,355"/>
            </defs>
            <text class="curve-label" font-family="Poppins" font-weight="700" font-size="58" fill="#000">
              <textPath href="#topArc" startOffset="50%" text-anchor="middle">
                KALYANI GOVERNMENT ENGINEERING COLLEGE
              </textPath>
            </text>
          </svg>
          <img src="logo.svg" alt="KGEC Logo" class="logo">
        </div>
      </section>

      <section id="group-title"   class="page-group title-group"></section>
      <section id="group-details" class="page-group details-group"></section>
      <section id="group-session" class="page-group session-group"></section>

    </div>
  </div>
  <script src="users.js"></script>
<script src="resolver.js"></script>
<script src="page.js"></script>
</body>
</html>
